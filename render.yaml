services:
  - type: web
    name: project-crm-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: SKIP_CREATE_ALL
        value: "1"
      - key: CORS_ORIGINS
        value: https://project-crm.vercel.app
      - key: CORS_ORIGIN_REGEX
        value: ^https://(project-crm-[a-z0-9-]+|project-[a-z0-9-]+-kuro-nacho-ramiro)\.vercel\.app$
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
